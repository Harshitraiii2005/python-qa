version: "3.9"
services:
  api:
    build: .
    ports:
      - "5001:5001"
    volumes:
      - ./data:/app/data          # mount your CSV
      - chroma_data:/app/chroma_db
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  chroma_data:
